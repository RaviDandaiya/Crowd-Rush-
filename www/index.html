<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Crowd Rush — Grow your crowd, smash through gates, clash with enemies, and crush the fortress! A hyper-casual mob control game.">
    <meta name="keywords" content="mob control, crowd game, hyper-casual, 3d web game, html5 game, runner, multiplier gates, crazygames">
    <meta name="theme-color" content="#0A0A1A">
    
    <!-- Open Graph / SEO -->
    <meta property="og:title" content="Crowd Rush">
    <meta property="og:description" content="Smash through gates, multiply your crowd, and crush the final fortress in this epic 3D hyper-casual runner!">
    <meta property="og:type" content="website">
    <meta property="og:image" content="promotional_banner.jpg">
    
    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Crowd Rush">
    <meta name="twitter:description" content="Smash through gates, multiply your crowd, and crush the final fortress in this epic 3D hyper-casual runner!">
    <meta name="twitter:image" content="promotional_banner.jpg">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Crowd Rush - Epic Mob Control Runner</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <h1><span>CROWD </span><span>RUSH</span></h1>
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
        <p class="loading-text">Loading game...</p>
    </div>

    <!-- Game Container -->
    <div id="game-container">
        <!-- 3D WebGL Canvas -->
        <canvas id="gameCanvas"></canvas>
        <!-- 2D UI Overlay Canvas -->
        <canvas id="uiCanvas"></canvas>
    </div>

    <!-- Three.js (0.150.1) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.150.1/three.min.js"></script>

    <!-- Scripts (order matters — dependencies first) -->
    <script src="js/utils.js?v=9"></script>
    <script src="js/effects.js?v=9"></script>
    <script src="js/sound.js?v=9"></script>
    <script src="js/combo.js?v=9"></script>
    <script src="js/level.js?v=9"></script>
    <script src="js/crowd.js?v=9"></script>
    <script src="js/gate.js?v=9"></script>
    <script src="js/obstacles.js?v=9"></script>
    <script src="js/enemy.js?v=9"></script>
    <script src="js/fortress.js?v=9"></script>
    <script src="js/shop.js?v=9"></script>
    <script src="js/ui.js?v=9"></script>
    <script src="js/game.js?v=9"></script>

    <script>
        // Hide loading screen once everything is ready
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loadingScreen = document.getElementById('loading-screen');
                loadingScreen.classList.add('hidden');
                setTimeout(() => loadingScreen.remove(), 600);
            }, 1300);
        });
    </script>
</body>
</html>
